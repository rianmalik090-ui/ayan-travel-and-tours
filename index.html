<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rian Travel and Tours</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
color:white;
text-align:center;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
font-size:48px;
animation:fade 2s ease;
}

p{
font-size:20px;
margin:20px;
max-width:700px;
animation:fade 3s ease;
}

.btn{
padding:15px 35px;
background:#00d4ff;
color:white;
text-decoration:none;
border-radius:30px;
font-size:20px;
transition:.3s;
}

.btn:hover{
background:white;
color:#000;
transform:scale(1.1);
}

.plane{
font-size:70px;
animation:fly 8s linear infinite;
position:absolute;
top:100px;
}

@keyframes fly{
0%{left:-100px;}
100%{left:110%;}
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>

</head>

<body>

<div class="plane">✈️</div>

<section class="hero">
<h1>Rian Travel and Tours</h1>

<p>Your trusted travel partner for Flight Tickets, Visa Services, Umrah & Hajj Packages, Hotel Booking and Holiday Tours.</p>

<a href="https://wa.me/923001234567" class="btn">Contact Us</a>

</section>

</body>
</html>
